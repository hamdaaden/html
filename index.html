<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Soldier Registration</title>

        <style>
          * {
            box-sizing: border-box;
          }

          body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #6dd5ed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .container {
            width: 95%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
          }

          h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 25px;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            color: transparent;
          }

          fieldset {
            border: none;
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f8fbff, #eef5ff);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
          }

          legend {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e3c72;
            padding: 5px 10px;
          }

          label {
            display: block;
            margin-top: 12px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #333;
          }

          input,
          select,
          textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fff;
          }

          input:focus,
          select:focus,
          textarea:focus {
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42, 82, 152, 0.4);
            outline: none;
          }

          .inline-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 8px;
          }

          .inline-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: normal;
          }

          textarea {
            resize: vertical;
          }

          .btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #2a5298, #6dd5ed);
            cursor: pointer;
            transition: all 0.3s ease;
          }

          .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
          }
        </style>
      </head>

      <body>
        <div class="container">
          <h1>🪖 Soldier & Weapon Registration</h1>

          <form action="google.com" method="post">
            <fieldset>
              <legend>Soldier Information</legend>

              <label>Full Name</label>
              <input type="text" placeholder="Enter full name" required />

              <label>Email</label>
              <input type="email" placeholder="Enter email" />

              <label>Password</label>
              <input type="password" />

              <label>Age</label>
              <input type="number" min="18" max="65" />

              <label>Date of Birth</label>
              <input type="date" />

              <label>Phone Number</label>
              <input type="tel" />

              <label>Rank</label>
              <select>
                <option>Private</option>
                <option>Corporal</option>
                <option>Sergeant</option>
                <option>Lieutenant</option>
                <option>Captain</option>
              </select>

              <label>Gender</label>
              <div class="inline-group">
                <label><input type="radio" name="gender" /> Male</label>
                <label><input type="radio" name="gender" /> Female</label>
                <label><input type="radio" name="gender" /> Other</label>
              </div>

              <label>Skills</label>
              <div class="inline-group">
                <label><input type="checkbox" /> Sniper</label>
                <label><input type="checkbox" /> Medic</label>
                <label><input type="checkbox" /> Engineer</label>
              </div>

              <label>Upload ID Photo</label>
              <input type="file" />

              <label>Favorite Color</label>
              <input type="color" />

              <label>Experience Level</label>
              <input type="range" min="0" max="10" />

              <label>Personal Bio</label>
              <textarea rows="4"></textarea>
            </fieldset>

            <fieldset>
              <legend>Weapon Information</legend>

              <label>Weapon Name</label>
              <input type="text" />

              <label>Weapon Type</label>
              <select>
                <option>Rifle</option>
                <option>Pistol</option>
                <option>Sniper</option>
                <option>Shotgun</option>
              </select>

              <label>Serial Number</label>
              <input type="text" />

              <label>Manufacture Date</label>
              <input type="month" />

              <label>Inspection Time</label>
              <input type="time" />

              <label>Next Maintenance Week</label>
              <input type="week" />

              <label>Weapon Condition</label>
              <input type="range" min="0" max="100" />

              <label>Notes</label>
              <textarea rows="3"></textarea>
            </fieldset>

            <fieldset>
              <legend>Agreement</legend>
              <label>
                <input type="checkbox" required />
                I confirm all information is accurate
              </label>
            </fieldset>

            <button type="submit" class="btn">Register</button>
          </form>
        </div>
      </body>
    </html>
  </body>
</html>
